<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工业智能运维助手 — AI Assistant</title>
<link rel="stylesheet" href="/shared/sidebar.css?v=3">
<script src="/shared/role-check.js"></script>
<script src="/shared/theme-init.js"></script>
<script src="/shared/navbar.js?v=3"></script>
<script src="/shared/role-switcher.js"></script>
<script src="/shared/demo-mode.js"></script>
<link rel="stylesheet" href="/shared/assistant.css">
<script src="/shared/assistant.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style> 
/* ═══════════════════════════════════════════════════════════════
   DESIGN TOKENS — provided by navbar.js (single source of truth)
   Ambient light orbs & base reset — provided by navbar.js
   ═══════════════════════════════════════════════════════════════ */

body {
  background: var(--bg-root); color: var(--text-primary);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  height: 100vh;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* ═══════════════════════════════════════════════════════════════
   HEADER — iOS 26 glass
   ═══════════════════════════════════════════════════════════════ */
.header {
  position: sticky; top:0; z-index:100;
  background: var(--glass-bg-header);
  backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
  border-bottom: 0.5px solid var(--glass-border);
  padding: 0 24px;
  flex-shrink: 0;
}
.header-inner {
  max-width: 1200px; margin:0 auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 52px;
}
.logo {
  display: flex; align-items: center; gap: 10px;
  font-weight: 700; font-size: 15px; color: var(--text-primary);
  font-family: var(--font-mono); letter-spacing: 1px;
  text-decoration: none;
}
.logo-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent-cyan);
  box-shadow: 0 0 6px var(--accent-cyan), 0 0 20px rgba(102,217,200,0.3);
  animation: pulse 2.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--accent-cyan), 0 0 20px rgba(102,217,200,0.3); }
  50% { opacity: 0.5; box-shadow: 0 0 2px var(--accent-cyan), 0 0 6px rgba(102,217,200,0.1); }
}
.header-right {
  display: flex; align-items: center; gap: 16px;
  font-size: 12px; color: var(--text-secondary);
}
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent-green);
  box-shadow: 0 0 4px var(--accent-green);
}
.status-dot.offline { background: var(--accent-red); box-shadow: 0 0 4px var(--accent-red); }
.back-link {
  color: var(--text-secondary); text-decoration: none;
  font-size: 12px; transition: color var(--transition);
}
.back-link:hover { color: var(--accent-cyan); }

/* ═══════════════════════════════════════════════════════════════
   CHAT LAYOUT
   ═══════════════════════════════════════════════════════════════ */
.chat-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  max-width: 900px;
  width: 100%;
  margin: 0 auto;
  padding: 0 24px;
  overflow: hidden;
  position: relative;
  z-index: 1;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 0 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.messages::-webkit-scrollbar {
  width: 4px;
}
.messages::-webkit-scrollbar-track {
  background: transparent;
}
.messages::-webkit-scrollbar-thumb {
  background: var(--border-light);
  border-radius: 2px;
}

/* ═══════════════════════════════════════════════════════════════
   WELCOME SCREEN
   ═══════════════════════════════════════════════════════════════ */
.welcome {
  text-align: center;
  padding: 48px 24px;
}
.welcome-icon {
  width: 64px; height: 64px;
  margin: 0 auto 16px;
  background: var(--glass-bg-card);
  backdrop-filter: var(--glass-blur-light); -webkit-backdrop-filter: var(--glass-blur-light);
  border: 0.5px solid var(--glass-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm), var(--glass-highlight);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
}
.welcome h2 {
  font-size: 20px; font-weight: 700;
  margin-bottom: 8px;
  color: var(--text-primary);
}
.welcome p {
  font-size: 13px; color: var(--text-secondary);
  max-width: 400px; margin: 0 auto 24px;
}
.quick-questions {
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center;
}
.quick-btn {
  background: var(--bg-card-alt);
  backdrop-filter: var(--glass-blur-light); -webkit-backdrop-filter: var(--glass-blur-light);
  border: 0.5px solid var(--glass-border);
  color: var(--text-secondary);
  padding: 8px 18px;
  border-radius: 22px;
  font-size: 13px; cursor: pointer;
  transition: all var(--transition);
  font-family: var(--font-sans);
}
.quick-btn:hover {
  border-color: var(--accent-cyan);
  color: var(--accent-cyan);
  background: rgba(102,217,200,0.06);
}

/* ═══════════════════════════════════════════════════════════════
   MESSAGE BUBBLES — iOS 26 glass
   ═══════════════════════════════════════════════════════════════ */
.message {
  display: flex; gap: 12px;
  max-width: 85%;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
  from { opacity:0; transform: translateY(8px); }
  to { opacity:1; transform: translateY(0); }
}
.message.user {
  align-self: flex-end;
  flex-direction: row-reverse;
}
.message.assistant {
  align-self: flex-start;
}

.msg-avatar {
  width: 32px; height: 32px; border-radius: var(--radius-sm);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700;
}
.message.assistant .msg-avatar {
  background: rgba(102,217,200,0.10);
  color: var(--accent-cyan);
  border: 0.5px solid rgba(102,217,200,0.20);
}
.message.user .msg-avatar {
  background: rgba(109,181,249,0.10);
  color: var(--accent-blue);
  border: 0.5px solid rgba(109,181,249,0.20);
}

.msg-content {
  background: var(--glass-bg-card);
  backdrop-filter: var(--glass-blur-light); -webkit-backdrop-filter: var(--glass-blur-light);
  border: 0.5px solid var(--glass-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm), var(--glass-highlight);
  padding: 12px 16px;
  font-size: 14px; line-height: 1.7;
  color: var(--text-primary);
  min-width: 0;
}
.message.user .msg-content {
  background: rgba(109,181,249,0.08);
  border-color: rgba(109,181,249,0.15);
}
/* Base markdown elements */
.msg-content p { margin-bottom: 8px; }
.msg-content p:last-child { margin-bottom: 0; }
.msg-content strong { color: var(--accent-cyan); }
.msg-content code {
  background: var(--bg-input);
  padding: 2px 6px; border-radius: var(--radius-sm);
  font-family: var(--font-mono); font-size: 12px;
  color: var(--accent-amber);
}
/* Markdown rendered by marked.js */
.msg-content h1, .msg-content h2, .msg-content h3 {
  font-size: 15px; font-weight: 700; margin: 12px 0 6px;
  color: var(--text-primary);
}
.msg-content h2 { font-size: 14px; }
.msg-content h3 { font-size: 13px; }
.msg-content ul, .msg-content ol { padding-left: 20px; margin: 6px 0; }
.msg-content li { margin-bottom: 3px; }
.msg-content table {
  width: 100%; border-collapse: collapse; margin: 8px 0;
  font-size: 12px;
}
.msg-content th, .msg-content td {
  border: 0.5px solid var(--border); padding: 6px 10px;
  text-align: left;
}
.msg-content th {
  background: var(--bg-card-alt); color: var(--accent-cyan);
  font-weight: 600;
}
.msg-content td { color: var(--text-secondary); }
.msg-content blockquote {
  border-left: 3px solid var(--accent-cyan);
  padding: 4px 12px; margin: 8px 0;
  color: var(--text-secondary);
  background: rgba(102,217,200,0.03);
}
.msg-content hr {
  border: none; border-top: 0.5px solid var(--border);
  margin: 12px 0;
}
.msg-content a { color: var(--accent-blue); }

/* Tool call card */
.tool-card {
  background: rgba(255,179,64,0.05);
  border: 0.5px solid rgba(255,179,64,0.2);
  border-radius: var(--radius-sm);
  margin-top: 8px;
  overflow: hidden;
}
.tool-card-header {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  cursor: pointer;
  font-size: 12px; color: var(--accent-amber);
  font-family: var(--font-mono);
}
.tool-card-header:hover { background: rgba(255,179,64,0.05); }
.tool-card-icon { font-size: 14px; }
.tool-card-body {
  display: none;
  padding: 8px 12px 12px;
  font-size: 11px; color: var(--text-secondary);
  border-top: 0.5px solid rgba(255,179,64,0.1);
}
.tool-card.open .tool-card-body { display: block; }
/* RAG tool card — purple tint for knowledge retrieval */
.tool-card.rag-tool {
  background: rgba(191,90,242,0.05);
  border: 0.5px solid rgba(191,90,242,0.2);
}
.tool-card.rag-tool .tool-card-header { color: var(--accent-purple); }
.tool-card.rag-tool .tool-card-body { border-top: 0.5px solid rgba(191,90,242,0.1); }
.tool-card-body pre {
  background: var(--bg-input);
  padding: 8px; border-radius: var(--radius-sm);
  overflow: auto; max-height: 200px;
  font-family: var(--font-mono); font-size: 11px;
  white-space: pre-wrap; word-break: break-all;
}

/* Loading dots */
.typing-dots {
  display: flex; gap: 4px; padding: 4px 0;
}
.typing-dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-muted);
  animation: typing 1.4s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing {
  0%, 60%, 100% { opacity:0.3; transform: translateY(0); }
  30% { opacity:1; transform: translateY(-4px); }
}

/* ═══════════════════════════════════════════════════════════════
   INPUT AREA — iOS 26 glass
   ═══════════════════════════════════════════════════════════════ */
.input-area {
  flex-shrink: 0;
  padding: 16px 0 24px;
}
.input-wrapper {
  background: var(--bg-input);
  backdrop-filter: var(--glass-blur-light); -webkit-backdrop-filter: var(--glass-blur-light);
  border: 0.5px solid var(--border-accent);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-sm), var(--glass-highlight);
  display: flex; align-items: flex-end;
  padding: 8px;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.input-wrapper:focus-within {
  border-color: var(--accent-cyan);
  box-shadow: 0 0 0 3px rgba(102,217,200,0.12);
}
.input-wrapper textarea {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 14px; line-height: 1.5;
  resize: none; outline: none;
  padding: 8px;
  min-height: 24px; max-height: 120px;
}
.input-wrapper textarea::placeholder {
  color: var(--text-muted);
}
.send-btn {
  background: var(--accent-cyan);
  border: none; border-radius: 22px;
  width: 38px; height: 38px;
  flex-shrink: 0;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
  color: #000;
  box-shadow: 0 4px 14px rgba(102,217,200,0.25);
}
.send-btn:hover {
  opacity: 0.88;
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(102,217,200,0.35);
}
.send-btn:disabled {
  background: var(--border-light);
  cursor: not-allowed;
  color: var(--text-muted);
  box-shadow: none;
}
.send-btn svg { width: 18px; height: 18px; }

.input-hint {
  text-align: center; font-size: 11px; color: var(--text-muted);
  margin-top: 8px;
}

/* ═══════════════════════════════════════════════════════════════
   SIDEBAR — iOS 26 glass
   ═══════════════════════════════════════════════════════════════ */
.chat-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
  position: relative;
  z-index: 1;
}
.sidebar {
  width: 260px;
  flex-shrink: 0;
  background: var(--glass-bg-sidebar);
  backdrop-filter: var(--glass-blur-strong); -webkit-backdrop-filter: var(--glass-blur-strong);
  border-left: 0.5px solid var(--glass-border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  order: 2;
  transition: width 0.3s cubic-bezier(0.25,0.1,0.25,1),
              border-left 0.3s cubic-bezier(0.25,0.1,0.25,1);
}
.sidebar.collapsed {
  width: 0;
  border-left-color: transparent;
}
.sidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 16px 12px;
  border-bottom: 0.5px solid var(--glass-border);
  flex-shrink: 0;
}
.sidebar-header-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-secondary);
  font-family: var(--font-mono);
  letter-spacing: 0.5px;
  white-space: nowrap;
  overflow: hidden;
}
.sidebar-toggle {
  background: var(--bg-card-alt);
  border: 0.5px solid var(--glass-border);
  color: var(--text-muted);
  width: 28px; height: 28px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
  flex-shrink: 0;
}
.sidebar-toggle:hover {
  border-color: var(--accent-cyan);
  color: var(--accent-cyan);
  background: rgba(102,217,200,0.06);
}
.sidebar-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.sidebar-list::-webkit-scrollbar {
  width: 3px;
}
.sidebar-list::-webkit-scrollbar-track {
  background: transparent;
}
.sidebar-list::-webkit-scrollbar-thumb {
  background: var(--border-light);
  border-radius: 2px;
}
.sidebar-item {
  display: flex;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
  border: 0.5px solid transparent;
  text-align: left;
  background: none;
  font-family: var(--font-sans);
  width: 100%;
}
.sidebar-item:hover {
  background: var(--glass-bg-card);
  backdrop-filter: var(--glass-blur-light); -webkit-backdrop-filter: var(--glass-blur-light);
  border-color: var(--glass-border);
}
.sidebar-item:active {
  background: rgba(102,217,200,0.06);
  border-color: rgba(102,217,200,0.20);
}
.sidebar-item-num {
  width: 20px; height: 20px;
  flex-shrink: 0;
  border-radius: var(--radius-sm);
  background: var(--bg-card-alt);
  border: 0.5px solid var(--border-light);
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 700;
  font-family: var(--font-mono);
  display: flex; align-items: center; justify-content: center;
  margin-top: 1px;
}
.sidebar-item:hover .sidebar-item-num {
  border-color: var(--accent-cyan);
  color: var(--accent-cyan);
}
.sidebar-item-text {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}
.sidebar-item-q {
  font-size: 13px;
  color: var(--text-primary);
  line-height: 1.4;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sidebar-item-sub {
  font-size: 10px;
  color: var(--text-muted);
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sidebar-item:hover .sidebar-item-q {
  color: var(--accent-cyan);
}
.sidebar-collapsed-tab {
  display: none;
  position: fixed;
  right: 0; top: 50%;
  transform: translateY(-50%);
  z-index: 10;
}
.chat-layout:has(.sidebar.collapsed) .sidebar-collapsed-tab {
  display: flex;
}
.sidebar-expand-btn {
  background: var(--glass-bg-sidebar);
  backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
  border: 0.5px solid var(--glass-border);
  border-right: none;
  color: var(--text-muted);
  width: 32px; height: 64px;
  border-radius: var(--radius-sm) 0 0 var(--radius-sm);
  cursor: pointer;
  font-size: 11px;
  font-weight: 500;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  transition: all 0.2s ease;
  box-shadow: -2px 0 12px rgba(0,0,0,0.15);
}
.sidebar-expand-btn:hover {
  background: var(--glass-bg-card);
  color: var(--accent-cyan);
  border-color: var(--accent-cyan);
}

/* ═══════════════════════════════════════════════════════════════
   MOBILE SIDEBAR
   ═══════════════════════════════════════════════════════════════ */
.sidebar-mobile-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 50;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
}
@media (max-width: 768px) {
  .sidebar {
    position: fixed; right:0; top:52px; bottom:0; z-index:55;
    transform: translateX(100%);
    transition: transform 0.3s ease;
  }
  .sidebar.mobile-open { transform: translateX(0); }
  .sidebar-mobile-overlay { display: none; }
  .sidebar.mobile-open ~ .sidebar-mobile-overlay { display: block; }
  .sidebar-mobile-btn {
    display: flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: var(--radius-sm);
    background: var(--bg-card-alt); border: 0.5px solid var(--glass-border);
    color: var(--text-secondary); cursor: pointer; font-size: 16px;
  }
}

/* ═══════════════════════════════════════════════════════════════
   ERROR
   ═══════════════════════════════════════════════════════════════ */
.error-banner {
  background: rgba(255,69,58,0.10);
  border: 0.5px solid rgba(255,69,58,0.3);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  color: var(--accent-red);
  font-size: 13px;
  margin: 8px 0;
}

/* Chart container */
.msg-chart {
  margin-top: 12px;
  border: 0.5px solid var(--glass-border);
  border-radius: var(--radius-md);
  overflow: hidden;
  background: var(--glass-bg-card);
  backdrop-filter: var(--glass-blur-light); -webkit-backdrop-filter: var(--glass-blur-light);
}
.msg-chart-header {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px;
  font-size: 12px; color: var(--accent-cyan);
  border-bottom: 0.5px solid var(--border);
  font-family: var(--font-mono);
}
.msg-chart-body {
  width: 100%; height: 320px;
}

/* Report download card */
.msg-report {
  margin-top: 12px;
  border: 0.5px solid rgba(102,217,200,0.20);
  border-radius: var(--radius-md);
  overflow: hidden;
  background: rgba(102,217,200,0.04);
}
.msg-report-header {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  font-size: 12px; color: var(--accent-cyan);
  border-bottom: 0.5px solid rgba(102,217,200,0.10);
  font-family: var(--font-mono);
}
.msg-report-body {
  padding: 14px;
  display: flex; align-items: center; gap: 12px;
}
.msg-report-info {
  flex: 1;
  font-size: 12px; color: var(--text-secondary); line-height: 1.6;
}
.msg-report-dl {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 18px;
  background: var(--accent-cyan);
  color: #000; border-radius: 22px;
  text-decoration: none; font-size: 12px; font-weight: 600;
  transition: all 0.2s;
  flex-shrink: 0;
}
.msg-report-dl:hover {
  box-shadow: 0 0 20px rgba(102,217,200,0.4);
}

/* ═══════════════════════════════════════════════════════════════
   Role-based visibility
   ═══════════════════════════════════════════════════════════════ */
html[data-role="operator"] .role-manager:not(.role-operator) { display: none !important; }
html[data-role="operator"] .role-developer:not(.role-operator) { display: none !important; }
html[data-role="manager"] .role-operator:not(.role-manager) { display: none !important; }
html[data-role="manager"] .role-developer:not(.role-manager) { display: none !important; }

/* Role-aware sidebar sections */
.sidebar-role-label {
  font-size: 9px; text-transform: uppercase; letter-spacing: 1px;
  padding: 8px 14px 4px; color: var(--text-muted);
  font-family: var(--font-mono);
  display: flex; align-items: center; gap: 6px;
}
.sidebar-role-label::before {
  content: ''; width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
  background: var(--text-muted);
}
.sidebar-role-label.role-operator::before { background: var(--accent-cyan); }
.sidebar-role-label.role-manager::before { background: var(--accent-amber); }
.sidebar-role-label.role-operator { color: var(--accent-cyan); }
.sidebar-role-label.role-manager { color: var(--accent-amber); }

/* RAG cite preview overlay */

<!-- ═══════════════════════════════════════════════════════════════

     ═══════════════════════════════════════════════════════════════ -->
<div class="chat-container">
  <div class="messages" id="messages">

    </div>

<script>
// ═══════════════════════════════════════════════════════════════
// MARKED.JS INIT
// ═══════════════════════════════════════════════════════════════
if (typeof marked !== 'undefined') {
  marked.setOptions({ breaks: true, gfm: true });
}

console.log('[init] script loaded');

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
const CHAT_STORAGE_KEY = 'pred_maint_chat_history';
const MAX_TURNS = 3;       // keep last 3 conversation turns
const MAX_MSGS = MAX_TURNS * 2; // 3 user + 3 assistant = 6 messages

let messages = [];          // conversation history for API
let isStreaming = false;
let currentAssistantMsg = null;
let currentToolCards = [];
let _ragCiteCache = [];     // global cache for RAG full_content lookup (tool cards)
let _ragCitations = [];    // citations from pre-retrieval (displayed at answer end)

// ═══════════════════════════════════════════════════════════════
// RAG 原文预览 — global functions
// ═══════════════════════════════════════════════════════════════
// LOCALSTORAGE — persist chat history across page navigation
// ═══════════════════════════════════════════════════════════════

function saveChatHistory() {
  try {
    const toSave = messages.slice(-MAX_MSGS);
    localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(toSave));
  } catch (e) {
    console.warn('[storage] Failed to save chat history:', e);
  }
}

function loadChatHistory() {
  try {
    const raw = localStorage.getItem(CHAT_STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      if (Array.isArray(saved) && saved.length > 0) {
        return saved;
      }
    }
  } catch (e) {
    console.warn('[storage] Failed to load chat history:', e);
  }
  return [];
}

function restoreChatUI(savedMessages) {
  if (!savedMessages || savedMessages.length === 0) return;
  // Hide welcome screen
  if (welcome) welcome.style.display = 'none';
  // Restore each message into the chat UI
  for (const msg of savedMessages) {
    if (msg.role === 'user') {
      addUserMessage(msg.content);
    } else if (msg.role === 'assistant') {
      const div = addAssistantPlaceholder();
      // Remove typing dots and insert rendered text
      const content = div.querySelector('.msg-content');
      const dots = content.querySelector('.typing-dots');
      if (dots) dots.remove();
      const textEl = document.createElement('div');
      textEl.className = 'assistant-text';
      textEl.innerHTML = renderMarkdown(msg.content);
      content.appendChild(textEl);
    }
  }
  // Populate in-memory messages array
  messages = savedMessages.slice();
  scrollToBottom();
}

// ═══════════════════════════════════════════════════════════════
// DOM refs
// ═══════════════════════════════════════════════════════════════
const msgContainer = document.getElementById('messages');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const welcome = document.getElementById('welcome');

console.log('[init] DOM refs:', {msgContainer: !!msgContainer, chatInput: !!chatInput, sendBtn: !!sendBtn});

// Restore chat history from localStorage on page load
const savedMessages = loadChatHistory();
restoreChatUI(savedMessages);
console.log('[init] restored', savedMessages.length, 'messages from localStorage');

// Auto-resize textarea
chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
});

function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}
console.log('[init] handleKeyDown defined');

// ═══════════════════════════════════════════════════════════════
// SIDEBAR — collapse/expand + question click
// ═══════════════════════════════════════════════════════════════
const sidebar = document.getElementById('sidebar');
const sidebarToggle = document.getElementById('sidebarToggle');
const sidebarExpandTab = document.getElementById('sidebarExpandTab');
let sidebarCollapsed = false;

function collapseSidebar() {
  sidebar.classList.add('collapsed');
  sidebarExpandTab.style.display = 'flex';
  sidebarCollapsed = true;
}

function expandSidebar() {
  sidebar.classList.remove('collapsed');
  sidebarExpandTab.style.display = 'none';
  sidebarCollapsed = false;
}

sidebarToggle.addEventListener('click', () => {
  if (sidebarCollapsed) {
    expandSidebar();
  } else {
    collapseSidebar();
  }
});

// Sidebar question items — same behavior as quick-btn
document.querySelectorAll('.sidebar-item').forEach(btn => {
  btn.addEventListener('click', () => {
    const q = btn.getAttribute('data-question');
    chatInput.value = q;
    sendMessage();
    // On mobile, close sidebar after selecting
    if (window.innerWidth <= 768) {
      sidebar.classList.remove('mobile-open');
    }
  });
});

// Mobile: hamburger button in header
const mobileToggle = document.getElementById('sidebarMobileToggle');
if (mobileToggle) {
  mobileToggle.addEventListener('click', () => {
    sidebar.classList.toggle('mobile-open');
  });
}

// Mobile overlay click to close
const mobileOverlay = document.getElementById('sidebarMobileOverlay');
if (mobileOverlay) {
  mobileOverlay.addEventListener('click', () => {
    sidebar.classList.remove('mobile-open');
  });
}

// ═══════════════════════════════════════════════════════════════
// SEND MESSAGE — SSE streaming with buffered markdown rendering
// ═══════════════════════════════════════════════════════════════
async function sendMessage() {
  console.log('[sendMessage] triggered');
  const text = chatInput.value.trim();
  if (!text || isStreaming) return;

  if (welcome) welcome.style.display = 'none';

  addUserMessage(text);
  messages.push({ role: 'user', content: text });
  saveChatHistory();

  chatInput.value = '';
  chatInput.style.height = 'auto';

  currentAssistantMsg = addAssistantPlaceholder();
  currentToolCards = [];
  _ragCiteCache = [];
  _ragCitations = [];
  _currentCiteData = null;

  isStreaming = true;
  sendBtn.disabled = true;
  chatInput.disabled = true;
  setStatus('thinking', '思考中...');

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: messages.slice() }),
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error || `HTTP ${response.status}`);
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let lineBuffer = '';
    let assistantText = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      lineBuffer += decoder.decode(value, { stream: true });
      const lines = lineBuffer.split('\n');
      lineBuffer = lines.pop(); // keep incomplete line

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const dataStr = line.slice(6).trim();
        if (!dataStr) continue;

        try {
          const event = JSON.parse(dataStr);
          handleSSEEvent(event, (t) => { assistantText += t; });
        } catch (e) { /* ignore parse errors */ }
      }
    }

    // Flush any pending render
    flushRender(currentAssistantMsg);

    if (assistantText.trim()) {
      messages.push({ role: 'assistant', content: assistantText.trim() });
      saveChatHistory();
    }

  } catch (err) {
    setAssistantError(currentAssistantMsg, err.message);
    setStatus('error', '连接失败');
  } finally {
    isStreaming = false;
    sendBtn.disabled = false;
    chatInput.disabled = false;
    chatInput.focus();
    if (statusText.textContent !== '连接失败') {
      setStatus('ready', '就绪');
    }
  }
}

function handleSSEEvent(event, onText) {
  switch (event.type) {
    case 'rag_citations':
      // Store citations from RAG pre-retrieval for rendering at answer end
      _ragCitations = event.citations || [];
      console.log('[rag] received', _ragCitations.length, 'citations');
      break;

    case 'text_delta':
      appendTextToAssistant(currentAssistantMsg, event.text);
      onText(event.text);
      break;

    case 'tool_call':
      addToolCard(currentAssistantMsg, event.name, event.arguments);
      agentLogAddCall(event.name, event.arguments);
      break;

    case 'tool_result':
      updateLastToolCard(currentAssistantMsg, event.name, event.summary);
      agentLogMarkDone(event.name);
      break;

    case 'tool_result_text':
      appendTextToAssistant(currentAssistantMsg, event.text);
      onText(event.text);
      break;

    case 'chart':
      console.log('[chart event]', event.name, event.chart_data);
      renderChart(currentAssistantMsg, event.chart_data);
      break;

    case 'report':
      console.log('[report event]', event.pdf_filename, event.pdf_url);
      renderReport(currentAssistantMsg, event);
      break;

    case 'error':
      setAssistantError(currentAssistantMsg, event.message);
      setStatus('error', '错误');
      break;

    case 'done':
      flushRender(currentAssistantMsg);
      // Apply RAG citation rendering and purple highlights
      if (_ragCitations.length > 0) {
        applyRagHighlighting(currentAssistantMsg, _ragCitations);
        renderRagCitations(currentAssistantMsg, _ragCitations);
      }
      finalizeAssistantMsg(currentAssistantMsg);
      setStatus('ready', '就绪');
      // Clear citations for next turn
      _ragCitations = [];
      break;
  }
}

// ═══════════════════════════════════════════════════════════════
// STREAMING MARKDOWN RENDER — buffered + RAF-throttled
// ═══════════════════════════════════════════════════════════════

/**
 * Append a text chunk to the assistant message buffer.
 * Does NOT touch innerHTML — only accumulates into msgDiv._textBuffer.
 * Schedules a render on the next animation frame (coalesced).
 */
function appendTextToAssistant(msgDiv, text) {
  if (!msgDiv._textBuffer) msgDiv._textBuffer = '';
  msgDiv._textBuffer += text;
  scheduleRender(msgDiv);
}

/**
 * Render the full text buffer through marked.parse() on next animation frame.
 * Multiple calls within the same frame are coalesced into one render.
 */
function scheduleRender(msgDiv) {
  if (msgDiv._renderPending) return;  // already scheduled
  msgDiv._renderPending = true;

  requestAnimationFrame(() => {
    msgDiv._renderPending = false;

    const content = msgDiv.querySelector('.msg-content');
    // Remove typing dots
    const dots = content.querySelector('.typing-dots');
    if (dots) dots.remove();

    // Get or create text element
    let textEl = content.querySelector('.assistant-text');
    if (!textEl) {
      textEl = document.createElement('div');
      textEl.className = 'assistant-text';
      content.appendChild(textEl);
    }

    // Full render from complete buffer
    textEl.innerHTML = renderMarkdown(msgDiv._textBuffer || '');
    scrollToBottom();
  });
}

/**
 * Force an immediate render (called on 'done' event to flush the last frame).
 */
function flushRender(msgDiv) {
  if (!msgDiv) return;
  // Cancel pending RAF
  if (msgDiv._renderPending) {
    msgDiv._renderPending = false;
  }

  const content = msgDiv.querySelector('.msg-content');
  const dots = content.querySelector('.typing-dots');
  if (dots) dots.remove();

  let textEl = content.querySelector('.assistant-text');
  if (!textEl) {
    textEl = document.createElement('div');
    textEl.className = 'assistant-text';
    content.appendChild(textEl);
  }

  const buf = msgDiv._textBuffer || '';
  if (buf) {
    textEl.innerHTML = renderMarkdown(buf);
  }
  scrollToBottom();
}

/**
 * Render full markdown text using marked.js (with fallback).
 * Unlike the old approach, this receives the ENTIRE accumulated text,
 * so markdown structures (tables, lists, bold spans) parse correctly.
 */
function renderMarkdown(text) {
  if (!text) return '';
  if (typeof marked !== 'undefined') {
    return marked.parse(text);
  }
  return formatMarkdownFallback(text);
}

function formatMarkdownFallback(text) {
  let html = escapeHtml(text);
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/\n\n/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  return '<p>' + html + '</p>';
}

// ═══════════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════════

function setStatus(state, text) {
  statusText.textContent = text;
  statusDot.className = 'status-dot' + (state === 'error' || state === 'offline' ? ' offline' : '');
}

function addUserMessage(text) {
  const div = document.createElement('div');
  div.className = 'message user';
  div.innerHTML = `<div class="msg-avatar">U</div><div class="msg-content">${escapeHtml(text)}</div>`;
  msgContainer.appendChild(div);
  scrollToBottom();
}

function addAssistantPlaceholder() {
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.id = 'msg-' + Date.now();
  // Streaming state on the DOM node
  div._textBuffer = '';
  div._renderPending = false;
  div.innerHTML = `
    <div class="msg-avatar">AI</div>
    <div class="msg-content">
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>`;
  msgContainer.appendChild(div);
  scrollToBottom();
  return div;
}

function addToolCard(msgDiv, toolName, args) {
  const content = msgDiv.querySelector('.msg-content');
  const dots = content.querySelector('.typing-dots');
  if (dots) dots.remove();

  // Detect RAG tools for special styling
  var isRagTool = toolName === 'search_system_docs' || toolName === 'search_maintenance_kb' || toolName === 'search_fault_cases';
  var toolLabel = toolName;
  var toolIcon = '&#9881;';  // gear
  if (toolName === 'search_system_docs') { toolLabel = '检索系统文档'; toolIcon = '&#128218;'; }
  else if (toolName === 'search_maintenance_kb') { toolLabel = '检索运维知识库'; toolIcon = '&#128295;'; }
  else if (toolName === 'search_fault_cases') { toolLabel = '检索故障案例库'; toolIcon = '&#128269;'; }

  var card = document.createElement('div');
  card.className = 'tool-card open' + (isRagTool ? ' rag-tool' : '');
  card.id = 'tool-' + Date.now();
  card.innerHTML = `
    <div class="tool-card-header" onclick="this.parentElement.classList.toggle('open')">
      <span class="tool-card-icon">${toolIcon}</span>
      <span>调用工具：${escapeHtml(toolLabel)}</span>
      <span style="margin-left:auto;font-size:10px;opacity:0.6;">&#9660;</span>
    </div>
    <div class="tool-card-body">
      <div style="margin-bottom:4px;color:var(--text-muted);">参数：</div>
      <pre>${escapeHtml(args)}</pre>
      <div class="tool-result" style="margin-top:6px;color:var(--text-muted);">执行中...</div>
    </div>`;
  content.appendChild(card);
  currentToolCards.push(card);
  scrollToBottom();
}

function updateLastToolCard(msgDiv, toolName, summary) {
  if (currentToolCards.length === 0) return;
  var card = currentToolCards[currentToolCards.length - 1];
  var resultEl = card.querySelector('.tool-result');
  if (!resultEl) return;

  // Try to parse RAG results for pretty display
  var isRagTool = toolName === 'search_system_docs' || toolName === 'search_maintenance_kb' || toolName === 'search_fault_cases';
  if (isRagTool) {
    try {
      var data = JSON.parse(summary);
      var results = data.results || [];
      if (results.length > 0) {
        var html = '<div style="margin-top:4px;color:var(--text-muted);">结果：找到 ' + data.total_found + ' 条相关内容</div>';
        for (var i = 0; i < Math.min(results.length, 5); i++) {
          var r = results[i];
          // Store full_content in global cache for preview on click
          var citeId = _ragCiteCache.length;
          _ragCiteCache.push({
            source: r.source || '',
            section: r.section || '',
            score: r.score || 0,
            fullContent: r.full_content || r.content || '',
            collection: r.collection || ''
          });
          html += '<div class="rag-result-clickable" onclick="openRagCitePreview(' + citeId + ')" title="点击查看原文片段"';
          html += ' style="margin-top:6px;padding:6px 8px;background:var(--bg-input);border-radius:var(--radius);font-size:11px;">';
          html += '<div style="color:var(--accent-purple);font-size:10px;margin-bottom:3px;">';
          html += '📄 ' + escapeHtml(r.source || '') + (r.section ? ' › ' + escapeHtml(r.section) : '');
          html += ' <span style="color:var(--text-muted);">相关度: ' + (r.score || 0).toFixed(2) + '</span>';
          html += '</div>';
          html += '<div style="color:var(--text-secondary);line-height:1.5;">' + escapeHtml((r.content || '').substring(0, 200)) + '</div>';
          html += '</div>';
        }
        resultEl.innerHTML = html;
        return;
      }
    } catch(e) { /* fall through to raw display */ }
  }

  // Default: raw text display
  resultEl.innerHTML = '<div style="margin-top:4px;color:var(--text-muted);">结果：</div>' +
    '<pre style="max-height:120px;">' + escapeHtml(summary) + '</pre>';
  scrollToBottom();
}

// ═══════════════════════════════════════════════════════════════
// RAG Cite Preview — open full chunk content in modal
// ═══════════════════════════════════════════════════════════════
var _currentCiteData = null;  // stores {source, collection} for "view full doc"

function openRagCitePreview(citeId) {
  var c = _ragCiteCache[citeId];
  if (!c) return;
  _currentCiteData = { source: c.source, section: c.section, collection: c.collection || '' };

  document.getElementById('ragCitePreviewTitle').textContent = '📄 ' + (c.source || '未知文档');
  document.getElementById('ragCitePreviewMeta').innerHTML =
    '📂 ' + escapeHtml(c.section || '(无章节)') +
    ' &nbsp;|&nbsp; 检索相似度: <b style="color:var(--accent-green);">' + Math.round(c.score * 100) + '%</b>';
  document.getElementById('ragCitePreviewContent').textContent = c.fullContent || '(无预览内容)';

  // Reset full doc view
  var fullDoc = document.getElementById('ragCitePreviewFullDoc');
  if (fullDoc) { fullDoc.classList.remove('show'); fullDoc.textContent = ''; }
  var viewBtn = document.getElementById('ragCitePreviewViewDocBtn');
  if (viewBtn) { viewBtn.textContent = '📄 查看完整文档'; viewBtn.disabled = false; }

  document.getElementById('ragCitePreviewOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function onViewFullDoc() {
  if (!_currentCiteData) return;
  loadFullDocument(_currentCiteData.source, _currentCiteData.collection);
}
function closeRagCitePreview() {
  document.getElementById('ragCitePreviewOverlay').classList.remove('show');
  document.body.style.overflow = '';
  // Hide full document panel
  var fullDoc = document.getElementById('ragCitePreviewFullDoc');
  if (fullDoc) { fullDoc.classList.remove('show'); fullDoc.textContent = ''; }
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeRagCitePreview();
});

// Fetch and display full document content
var _fullDocCache = {};  // cache for full document content
async function loadFullDocument(source, collection) {
  var fullDocEl = document.getElementById('ragCitePreviewFullDoc');
  if (!fullDocEl) return;

  // Toggle if already loaded
  if (fullDocEl.classList.contains('show')) {
    fullDocEl.classList.remove('show');
    document.getElementById('ragCitePreviewViewDocBtn').textContent = '📄 查看完整文档';
    return;
  }

  // Check cache
  var cacheKey = collection + '::' + source;
  if (_fullDocCache[cacheKey]) {
    fullDocEl.textContent = _fullDocCache[cacheKey];
    fullDocEl.classList.add('show');
    document.getElementById('ragCitePreviewViewDocBtn').textContent = '📄 收起完整文档';
    return;
  }

  // Show loading
  fullDocEl.textContent = '加载中...';
  fullDocEl.classList.add('show');
  document.getElementById('ragCitePreviewViewDocBtn').textContent = '📄 加载中...';
  document.getElementById('ragCitePreviewViewDocBtn').disabled = true;

  try {
    var url = '/api/knowledge-base/document-content?source=' + encodeURIComponent(source)
            + '&collection=' + encodeURIComponent(collection);
    var resp = await fetch(url);
    var data = await resp.json();
    if (data.success && data.content) {
      _fullDocCache[cacheKey] = data.content;
      // Truncate very long documents for preview
      var content = data.content;
      if (content.length > 8000) {
        content = content.substring(0, 8000)
          + '\n\n... (文档过长，已截断前 8000 字符。'
          + '共 ' + (data.size_kb || '?') + ' KB)';
      }
      fullDocEl.textContent = content;
      document.getElementById('ragCitePreviewViewDocBtn').textContent = '📄 收起完整文档';
    } else {
      fullDocEl.textContent = data.message || data.error || '无法加载文档';
      document.getElementById('ragCitePreviewViewDocBtn').textContent = '📄 查看完整文档';
    }
  } catch (e) {
    fullDocEl.textContent = '加载失败: ' + e.message;
    document.getElementById('ragCitePreviewViewDocBtn').textContent = '📄 查看完整文档';
  }
  document.getElementById('ragCitePreviewViewDocBtn').disabled = false;
}

// Render citation references at the end of a RAG-assisted answer
function renderRagCitations(msgDiv, citations) {
  if (!msgDiv || !citations || citations.length === 0) return;
  var content = msgDiv.querySelector('.msg-content');
  if (!content) return;

  // Build citation block HTML
  var html = '<div class="rag-cite-block">';
  html += '<div class="rag-cite-block-header">📚 参考了 ' + citations.length + ' 篇知识库文档</div>';
  for (var i = 0; i < citations.length; i++) {
    var c = citations[i];
    var citeId = _ragCiteCache.length;
    _ragCiteCache.push({
      source: c.source || '',
      section: c.section || '',
      score: c.score || 0,
      fullContent: c.full_content || '',
      collection: c.collection || ''
    });
    var sourceName = (c.source || '未知文档').replace(/\\/g, '/').split('/').pop() || c.source;
    var sectionInfo = c.section ? ' · ' + escapeHtml(c.section) : '';
    var scorePct = Math.round((c.score || 0) * 100);
    html += '<div class="rag-cite-item" onclick="openRagCitePreview(' + citeId + ')" title="点击查看原文片段">';
    html += '<span class="rag-cite-num">' + (i + 1) + '</span>';
    html += '<span class="rag-cite-source">' + escapeHtml(sourceName) + '</span>';
    html += '<span class="rag-cite-section">' + sectionInfo + '</span>';
    html += '<span class="rag-cite-score">相似度 ' + scorePct + '%</span>';
    html += '</div>';
  }
  html += '</div>';

  // Insert before tool cards
  var lastToolCard = content.querySelector('.tool-card:last-of-type');
  var citeBlock = document.createElement('div');
  citeBlock.innerHTML = html;
  if (lastToolCard) {
    lastToolCard.insertAdjacentElement('afterend', citeBlock.firstElementChild);
  } else {
    content.appendChild(citeBlock.firstElementChild);
  }
}

// Apply purple highlighting to phrases from RAG citations found in the answer.
// Uses a safe DOM text-node walk to avoid breaking HTML structure.
function applyRagHighlighting(msgDiv, citations) {
  if (!msgDiv || !citations || citations.length === 0) return;
  var textEl = msgDiv.querySelector('.assistant-text');
  if (!textEl) return;

  // Add RAG badge at the top of the answer
  var badgeHtml = '<div class="rag-badge"><span class="rag-badge-icon">📚</span>本回答基于知识库检索生成 · ' + citations.length + ' 篇参考文档</div>';
  textEl.insertAdjacentHTML('afterbegin', badgeHtml);

  // Collect distinctive phrases from citation content (15-60 chars, must contain Chinese)
  var phrases = [];
  var seen = {};
  for (var i = 0; i < citations.length; i++) {
    var content = citations[i].full_content || citations[i].content_snippet || '';
    if (!content) continue;
    var sentences = content.split(/[。！？\n;；]/);
    for (var j = 0; j < sentences.length; j++) {
      var phrase = sentences[j].trim();
      if (phrase.length < 15 || phrase.length > 60) continue;
      if (seen[phrase]) continue;
      if (!/[一-鿿]/.test(phrase)) continue;
      seen[phrase] = true;
      phrases.push(phrase);
    }
  }
  if (phrases.length === 0) return;
  // Sort by length descending — longer phrases are more distinctive
  phrases.sort(function(a, b) { return b.length - a.length; });

  // Walk text nodes in the assistant-text element and apply highlights
  var maxHighlights = 6;
  var replaced = 0;
  _highlightInTextNodes(textEl, phrases, maxHighlights, replaced);
}

// Recursively walk text nodes and highlight phrases
function _highlightInTextNodes(node, phrases, maxHighlights, replaced) {
  if (replaced >= maxHighlights) return replaced;
  if (!node) return replaced;

  if (node.nodeType === 3) {  // Text node
    var text = node.textContent;
    for (var i = 0; i < phrases.length && replaced < maxHighlights; i++) {
      var phrase = phrases[i];
      if (phrase.length < 15) continue;
      // Use a substring for matching (avoid regex escape issues)
      var searchStr = phrase.substring(0, Math.min(phrase.length, 35));
      var idx = text.indexOf(searchStr);
      if (idx >= 0) {
        // Split the text node: [before] [highlight] [after]
        var before = text.substring(0, idx);
        var match = text.substring(idx, idx + searchStr.length);
        var after = text.substring(idx + searchStr.length);

        var parent = node.parentNode;
        var beforeNode = document.createTextNode(before);
        var mark = document.createElement('mark');
        mark.className = 'rag-sourced';
        mark.textContent = match;
        var afterNode = document.createTextNode(after);

        parent.insertBefore(beforeNode, node);
        parent.insertBefore(mark, node);
        parent.insertBefore(afterNode, node);
        parent.removeChild(node);

        replaced++;
        // Continue searching in the after text node
        return _highlightInTextNodes(afterNode, phrases, maxHighlights, replaced);
      }
    }
    return replaced;
  }

  // Element node — walk children (skip <mark> and <script>/<style>)
  if (node.nodeType === 1) {
    var tag = node.tagName.toLowerCase();
    if (tag === 'mark' || tag === 'script' || tag === 'style' || tag === 'code' || tag === 'pre') {
      return replaced;
    }
    var children = Array.from(node.childNodes);
    for (var k = 0; k < children.length && replaced < maxHighlights; k++) {
      replaced = _highlightInTextNodes(children[k], phrases, maxHighlights, replaced);
    }
  }
  return replaced;
}

function renderChart(msgDiv, chartData) {
  console.log('[renderChart]', chartData);
  if (!chartData || typeof echarts === 'undefined') { console.log('[renderChart] blocked - no data or no echarts'); return; }

  try {
    const content = msgDiv.querySelector('.msg-content');
    if (!content) { console.log('[renderChart] no .msg-content'); return; }

    // Build chart container
    const chartId = 'chart-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);
    const wrapper = document.createElement('div');
    wrapper.className = 'msg-chart';

    const header = document.createElement('div');
    header.className = 'msg-chart-header';
    header.innerHTML = '&#9776; ' + escapeHtml(chartData.title || '图表');

    const body = document.createElement('div');
    body.className = 'msg-chart-body';
    body.id = chartId;

    wrapper.appendChild(header);
    wrapper.appendChild(body);
    content.appendChild(wrapper);

    // Build ECharts option from chart_data
    const option = buildChartOption(chartData);
    console.log('[renderChart] option built:', option);
    if (!option) { console.log('[renderChart] buildChartOption returned null'); return; }

    // Delay to let DOM layout settle
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        const dom = document.getElementById(chartId);
        if (!dom) { console.log('[renderChart] DOM not found:', chartId); return; }
        console.log('[renderChart] init ECharts on', chartId);
        const chart = echarts.init(dom, null, { renderer: 'canvas' });
        chart.setOption(option);
        // Track for cleanup
        if (!msgDiv._charts) msgDiv._charts = [];
        msgDiv._charts.push(chart);
        // Resize handler
        const ro = new ResizeObserver(() => chart.resize());
        ro.observe(dom);
      });
    });

    scrollToBottom();
  } catch (e) {
    console.error('[renderChart] ERROR:', e);
  }
}

function buildChartOption(cd) {
  console.log('[buildChartOption]', cd);
  if (!cd || !cd.series) { console.log('[buildChartOption] blocked - no cd or series'); return null; }

  try {
    const colors = ['#00c9a0', '#f0a030', '#f04444', '#4d94ff', '#a371f7', '#3fb950'];
    const isDark = true;

    const option = {
      backgroundColor: 'transparent',
      tooltip: {
        trigger: 'axis',
        backgroundColor: 'rgba(14,17,23,0.95)',
        borderColor: '#1c2230',
        textStyle: { color: '#e6ebf2', fontSize: 12 },
      },
      legend: {
        bottom: 0,
        textStyle: { color: '#8e9aab', fontSize: 11 },
        icon: 'roundRect',
      },
      grid: { left: '3%', right: '4%', top: 40, bottom: 40 },
      xAxis: {
        type: 'category',
        data: cd.x_axis || cd.xAxis || [],
        axisLine: { lineStyle: { color: '#2a3a50' } },
        axisTick: { show: false },
        axisLabel: { color: '#5a6474', fontSize: 10, rotate: (cd.x_axis || cd.xAxis || []).length > 20 ? 45 : 0 },
        splitLine: { show: false },
      },
      yAxis: {
        type: 'value',
        name: cd.yAxisName || '',
        nameTextStyle: { color: '#8e9aab', fontSize: 11 },
        axisLine: { show: false },
        axisTick: { show: false },
        axisLabel: { color: '#5a6474', fontSize: 10 },
        splitLine: { lineStyle: { color: '#1c2230', type: 'dashed' } },
      },
    };

    // Series
    option.series = cd.series.map((s, i) => {
      const base = {
        name: s.name,
        type: s.type || 'line',
        data: s.data || [],
        symbol: 'circle',
        symbolSize: s.type === 'scatter' ? 6 : 3,
        smooth: s.type !== 'scatter',
      };

      if (s.type === 'scatter') {
        base.itemStyle = { color: s.color || colors[i] || '#f04444' };
        base.markLine = s.markLine || undefined;
      } else {
        base.lineStyle = { width: 2, color: s.color || s.lineColor || colors[i % colors.length] };
        base.itemStyle = { color: s.color || s.lineColor || colors[i % colors.length] };
      }

      // Area style for rolling average
      if (s.name && s.name.indexOf('移动平均') >= 0) {
        base.lineStyle = { width: 2.5, color: s.lineColor || '#f0a030' };
        base.areaStyle = { color: 'rgba(240,160,48,0.08)' };
        base.z = 10;
      }

      // Mark points for anomalies
      if (cd.markPoints && cd.markPoints.length > 0) {
        base.markPoint = {
          data: cd.markPoints.map(p => ({
            name: p.name || '',
            coord: p.coord || [p.xAxis, p.value],
            value: p.label || p.value,
            itemStyle: { color: '#f04444' },
            label: { color: '#e6ebf2', fontSize: 10, formatter: '{c}' },
          })),
        };
      }

      return base;
    });

    // Threshold lines — after option.series is assigned (outside map callback)
    if (cd.thresholds) {
      const markLines = [];
      const threshColors = {
        warning_upper: '#f0a030',
        warning_lower: '#f0a030',
        alarm_upper: '#f04444',
        alarm_lower: '#f04444',
      };
      for (const [key, val] of Object.entries(cd.thresholds)) {
        if (val != null) {
          markLines.push({
            name: key,
            yAxis: val,
            lineStyle: { color: threshColors[key] || '#f0a030', type: 'dashed', width: 1 },
            label: { formatter: key + ' ({c})', color: '#8e9aab', fontSize: 10 },
          });
        }
      }
      if (markLines.length > 0) {
        var mainSeries = option.series.find(function(s) { return s.type !== 'scatter'; }) || option.series[0];
        if (mainSeries) {
          mainSeries.markLine = { silent: true, symbol: 'none', data: markLines };
        }
      }
    }

    // Multi-line specific: add legend emphasis
    if (cd.chart_type === 'multi_line') {
      option.legend.bottom = 0;
    }

    console.log('[buildChartOption] success, option:', option);
    return option;
  } catch (e) {
    console.error('[buildChartOption] ERROR:', e);
    return null;
  }
}

var _agentLogCalls = [];

var _agentLogTotalMs = 0;

function agentLogAddCall(name, args) {
  _agentLogCalls.push({ name: name, args: args, done: false, error: false, startTime: Date.now() });
  _agentLogStartTimes[name + '_' + (_agentLogCalls.length - 1)] = Date.now();
  updateAgentLogUI();
}

function agentLogMarkDone(name) {
  // Mark the last matching undone call as done
  for (var i = _agentLogCalls.length - 1; i >= 0; i--) {
    if (_agentLogCalls[i].name === name && !_agentLogCalls[i].done) {
      var key = name + '_' + i;
      var elapsed = Date.now() - (_agentLogStartTimes[key] || Date.now());
      _agentLogCalls[i].done = true;
      _agentLogCalls[i].latencyMs = elapsed;
      _agentLogTotalMs += elapsed;
      updateAgentLogUI();
      return;
    }
  }
}

function updateAgentLogUI() {
  var btn = document.getElementById('agentLogBtn');
  var badge = document.getElementById('agentLogBadge');
  var count = _agentLogCalls.length;
  if (count > 0 && btn) {
    btn.classList.add('show');
    if (badge) { badge.style.display = 'flex'; badge.textContent = count; }
  }

  var doneCount = _agentLogCalls.filter(function(c) { return c.done; }).length;
  var errCount = _agentLogCalls.filter(function(c) { return c.error; }).length;
  var okEl = document.getElementById('agentLogOk');
  var errEl = document.getElementById('agentLogErr');
  var msEl = document.getElementById('agentLogTotalMs');
  if (okEl) okEl.textContent = doneCount;
  if (errEl) errEl.textContent = errCount;
  if (msEl) msEl.textContent = _agentLogTotalMs + 'ms';

  renderAgentLogTimeline();
}

function renderAgentLogTimeline() {
  var timeline = document.getElementById('agentLogTimeline');
  var empty = document.getElementById('agentLogEmpty');
  if (!timeline) return;
  if (_agentLogCalls.length === 0) {
    timeline.style.display = 'none';
    if (empty) empty.style.display = 'block';
    return;
  }
  if (empty) empty.style.display = 'none';
  timeline.style.display = 'block';

  var html = '';
  _agentLogCalls.forEach(function(c, i) {
    var reason = TOOL_REASONS[c.name] || '执行工具调用';
    var statusClass = c.error ? 'error' : (c.done ? 'success' : '');
    var statusIcon = c.error ? '✕' : (c.done ? '✓' : '⋯');
    var latencyStr = c.latencyMs ? (c.latencyMs + 'ms') : '处理中...';
    html += '<div class="agent-log-step ' + statusClass + '">' +
      '<div class="agent-log-step-num">' + statusIcon + ' Step ' + (i + 1) + ' / ' + _agentLogCalls.length + '</div>' +
      '<div class="agent-log-step-name">' + c.name + '</div>' +
      '<div class="agent-log-step-reason">' + reason + '</div>' +
      '<div class="agent-log-step-latency">⏱ ' + latencyStr + '</div>' +
      '</div>';
  });
  timeline.innerHTML = html;
}

function agentLogReset() {
  _agentLogCalls = [];
  _agentLogStartTimes = {};
  _agentLogTotalMs = 0;
  var btn = document.getElementById('agentLogBtn');
  if (btn) btn.classList.remove('show');
  updateAgentLogUI();
  // Close panel if open
  var panel = document.getElementById('agentLogPanel');
  var overlay = document.getElementById('agentLogOverlay');
  if (panel) panel.classList.remove('show');
  if (overlay) overlay.classList.remove('show');
}

function toggleAgentLog() {
  var panel = document.getElementById('agentLogPanel');
  var overlay = document.getElementById('agentLogOverlay');
  if (!panel || !overlay) return;
  var isOpen = panel.classList.contains('show');
  if (isOpen) {
    panel.classList.remove('show');
    overlay.classList.remove('show');
  } else {
    panel.classList.add('show');
    overlay.classList.add('show');
    renderAgentLogTimeline();
  }
}

  if (!list) return;
  var items = list.querySelectorAll('.sidebar-item');
  var labels = list.querySelectorAll('.sidebar-role-label');
  var n = 0;
  labels.forEach(function(l) {
    if (role === 'operator') l.style.display = l.classList.contains('role-operator') ? '' : 'none';
    else if (role === 'manager') l.style.display = l.classList.contains('role-manager') ? '' : 'none';
  });
  items.forEach(function(item) {
    var op = item.classList.contains('role-operator');
    var mg = item.classList.contains('role-manager');
    var dv = item.classList.contains('role-developer');
    var show = false;
    if (role === 'operator') show = op || (!mg && !dv);
    else if (role === 'manager') show = mg || (!op && !dv);
    if (show) {
      item.style.display = '';
      n++;
      var nm = item.querySelector('.sidebar-item-num');
      if (nm) nm.textContent = n;
    } else {
      item.style.display = 'none';
    }
  });
  // Update welcome message for role
  var icon = document.getElementById('welcome-icon');
  var text = document.getElementById('welcome-text');
  if (icon && text) {
    if (role === 'operator') {
      icon.innerHTML = '&#9881;';
      text.textContent = '我可以帮您查询设备状态、分析异常原因、生成维护建议。基于真实MCP工具和DeepSeek推理引擎。';
    } else if (role === 'manager') {
      icon.innerHTML = '&#128202;';
      text.textContent = '我可以帮您分析运维成本效益、对比维护策略、评估传感器投资回报。基于真实MCP工具和DeepSeek推理引擎。';
    }
  }
})();
</script>

<!-- Agent Decision Log -->
<button class="agent-log-btn" id="agentLogBtn" onclick="toggleAgentLog()" title="Agent决策日志">
  🧠
  <span class="agent-log-badge" id="agentLogBadge" style="display:none;">0</span>
</button>
<div class="agent-log-overlay" id="agentLogOverlay" onclick="toggleAgentLog()"></div>
<div class="agent-log-panel" id="agentLogPanel">
  <div class="agent-log-header" id="agentLogHeader">
    <span class="agent-log-header-title">🧠 Agent 决策日志</span>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="agent-log-stats">
        <span>调用: <span class="ok" id="agentLogOk">0</span></span>
        <span>失败: <span class="err" id="agentLogErr">0</span></span>
        <span>总耗时: <span id="agentLogTotalMs">0ms</span></span>
      </div>
      <button class="agent-log-close" onclick="toggleAgentLog()">✕</button>
    </div>
  </div>
  <div class="agent-log-body" id="agentLogBody">
    <div class="agent-log-empty" id="agentLogEmpty">本次对话尚未调用工具</div>
    <div class="agent-log-timeline" id="agentLogTimeline" style="display:none;"></div>
  </div>
</div>

</body>
</html>
