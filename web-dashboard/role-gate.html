<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工业智能运维平台 — 角色选择</title>
<link rel="stylesheet" href="/shared/design-tokens.css?v=1">
<script src="/shared/theme-init.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════════════
   Industrial Tech Role Selection — Roadshow Edition
   ═══════════════════════════════════════════════════════════════════ */

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  margin: 0; padding: 0;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 40px 20px;
  font-family: var(--font-sans);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  /* Industrial deep navy gradient with ambient glows */
  background:
    radial-gradient(ellipse 120% 80% at 20% 10%, rgba(14, 165, 233, 0.12) 0%, transparent 55%),
    radial-gradient(ellipse 100% 70% at 80% 50%, rgba(139, 92, 246, 0.08) 0%, transparent 55%),
    radial-gradient(ellipse 90% 60% at 50% 90%, rgba(245, 158, 11, 0.06) 0%, transparent 55%),
    linear-gradient(180deg, #0F172A 0%, #0A1628 40%, #0F172A 100%);
  position: relative;
}

/* Data grid lines — subtle tech texture */
body::after {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.04;
  background-image:
    linear-gradient(rgba(14, 165, 233, 0.3) 1px, transparent 1px),
    linear-gradient(90deg, rgba(14, 165, 233, 0.3) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 0%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 0%, transparent 70%);
}

/* Floating particles */
.particles {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
}
.particle {
  position: absolute;
  width: 2px; height: 2px;
  background: var(--accent-cyan);
  border-radius: 50%;
  opacity: 0;
  animation: floatUp linear infinite;
}
.particle:nth-child(1)  { left: 10%; animation-duration: 8s; animation-delay: 0s; }
.particle:nth-child(2)  { left: 25%; animation-duration: 12s; animation-delay: 1s; width: 1px; height: 1px; }
.particle:nth-child(3)  { left: 40%; animation-duration: 10s; animation-delay: 3s; }
.particle:nth-child(4)  { left: 55%; animation-duration: 14s; animation-delay: 0.5s; width: 1.5px; height: 1.5px; }
.particle:nth-child(5)  { left: 70%; animation-duration: 9s; animation-delay: 2s; }
.particle:nth-child(6)  { left: 85%; animation-duration: 11s; animation-delay: 4s; width: 1px; height: 1px; }
.particle:nth-child(7)  { left: 15%; animation-duration: 13s; animation-delay: 5s; }
.particle:nth-child(8)  { left: 60%; animation-duration: 7s; animation-delay: 1.5s; }
.particle:nth-child(9)  { left: 35%; animation-duration: 15s; animation-delay: 3.5s; width: 2.5px; height: 2.5px; }
.particle:nth-child(10) { left: 75%; animation-duration: 10s; animation-delay: 6s; }

@keyframes floatUp {
  0%   { transform: translateY(100vh) scale(0); opacity: 0; }
  10%  { opacity: 0.8; }
  90%  { opacity: 0.3; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

/* Override design-tokens body::before — use our own ambient orbs */
body::before {
  background:
    radial-gradient(ellipse 100% 70% at 30% 15%, rgba(14, 165, 233, 0.07) 0%, transparent 60%),
    radial-gradient(ellipse 80% 60% at 70% 50%, rgba(139, 92, 246, 0.05) 0%, transparent 60%),
    radial-gradient(ellipse 90% 50% at 50% 85%, rgba(245, 158, 11, 0.04) 0%, transparent 60%) !important;
}

.role-gate-container {
  max-width: 960px; width: 100%; text-align: center;
  position: relative; z-index: 1;
}

.role-gate-title {
  font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
  color: var(--text-primary); margin-bottom: 6px;
}

.role-gate-subtitle {
  font-size: 14px; color: var(--text-secondary); margin-bottom: 32px;
}

.role-cards {
  display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
}

.role-card {
  flex: 1; min-width: 240px; max-width: 280px;
  background: var(--glass-bg-card);
  backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
  border: 0.5px solid var(--glass-border);
  border-radius: var(--radius-xl);
  padding: 28px 24px 24px;
  box-shadow: var(--shadow-sm), var(--glass-highlight);
  cursor: pointer; text-align: center;
  transition: all var(--transition-spring);
  position: relative; overflow: hidden;
}

.role-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg), var(--glass-highlight-strong);
}

.role-card:active { transform: scale(0.98); }

.role-card .card-icon { font-size: 36px; margin-bottom: 12px; }

.role-card .card-title {
  font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px;
}

.role-card .card-subtitle {
  font-size: 11px; color: var(--text-muted); margin-bottom: 12px;
}

.role-card .card-desc {
  font-size: 12px; color: var(--text-secondary); line-height: 1.6;
}

.role-card.card-operator { border-top: 3px solid var(--accent-cyan); }
.role-card.card-manager { border-top: 3px solid var(--accent-amber); }
.role-card.card-developer { border-top: 3px solid var(--accent-purple); }

.role-card { animation: cardIn 0.5s var(--transition-spring) both; }
.role-card:nth-child(1) { animation-delay: 0.05s; }
.role-card:nth-child(2) { animation-delay: 0.15s; }
.role-card:nth-child(3) { animation-delay: 0.25s; }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.role-gate-footer {
  text-align: center; margin-top: 36px;
  font-size: 12px; color: var(--text-muted);
  letter-spacing: 0.3px;
}
.role-gate-footer span { color: var(--text-secondary); }

@media (max-width: 860px) {
  .role-cards { flex-direction: column; align-items: center; }
  .role-card { max-width: 100%; }
  .role-gate-title { font-size: 22px; }
}
@media (max-width: 480px) {
  .role-gate-title { font-size: 19px; }
}
</style>
</head>
<body>

<div class="particles">
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
</div>

<div class="role-gate-container">
  <h1 class="role-gate-title">工业智能运维平台</h1>
  <p class="role-gate-subtitle">请选择您的角色，进入专属工作视图 &mdash; 同一系统，不同视角</p>

  <div class="role-cards">

    <div class="role-card card-operator" onclick="selectRole('operator')">
      <div class="card-icon">&#9881;</div>
      <div class="card-title">运维工程师</div>
      <div class="card-subtitle">Operator &middot; 执行层</div>
      <div class="card-desc">设备健康监控、异常告警处理、工单执行跟踪、根因归因分析</div>
    </div>

    <div class="role-card card-manager" onclick="selectRole('manager')">
      <div class="card-icon">&#128202;</div>
      <div class="card-title">生产管理负责人</div>
      <div class="card-subtitle">Manager &middot; 决策层</div>
      <div class="card-desc">运维业务关键指标总览、成本效益分析与预算管控、策略对比选择、ROI分析</div>
    </div>

    <div class="role-card card-developer" onclick="selectRole('developer')">
      <div class="card-icon">&#128295;</div>
      <div class="card-title">平台开发人员</div>
      <div class="card-subtitle">Developer &middot; 全量视图</div>
      <div class="card-desc">完整数据探索与技术分析、预测模型评估与对比、系统架构文档、全部页面可见</div>
    </div>

  </div>

  <p class="role-gate-footer">
    &#128161; 提示：您可以在任意页面的顶部导航栏<span>切换角色</span>，无需重新选择
  </p>
</div>

<script>
/**
 * Select a role and navigate to the intended destination.
 * Reads ?redirect= param from URL to go back to the page the user originally requested.
 */
function selectRole(role) {
  sessionStorage.setItem('user_role', role);

  // Parse redirect target from URL
  var params = new URLSearchParams(window.location.search);
  var redirect = params.get('redirect');
  var target = '/';

  if (redirect) {
    try {
      target = decodeURIComponent(redirect);
      // Safety: only allow relative paths
      if (!target.startsWith('/')) { target = '/'; }
    } catch (e) {
      target = '/';
    }
  }

  // If target is root, send operator/manager to their default views
  // developer sees the home grid (current behavior)
  if (target === '/') {
    if (role === 'manager') {
      target = '/dashboard';
    }
    // operator and developer stay on / (home.html)
  }

  window.location.href = target;
}
</script>

</body>
</html>
